services:
  - type: web
    name: connect-four-ai-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install --production=false && npm run build
    startCommand: cd backend && npm start
    workingDirectory: ./
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://praveens2666.github.io/Connect_Four_Game
